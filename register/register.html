<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registeration page</title>
</head>
<body>
    
    <h1>Registration:</h1>
    <hr>
    <form action="../index.html">

        Personal information:-
        <br>
        Full Name: <input type="text" placeholder="Enter your full name"><br>
        Gender: <input type="radio" id="female" value="Female" name="gender">
                <label for="female">Female</label> 

                <input type="radio" id="male" value="Male" name="gender">
                <label for=male>Male</label><br>
        Date of Birth: <input type="date"><br>
        Email: <input type="email"><br>
        Phone Number: <input type="Phone"><br><br>

        Academic Information:-<br>
        Course: <select id="courses">
            <option value="B.Tech">B.Tech</option>
            <option value="BCA">BCA</option>
            <option value="MCA">MCA</option>
            <option value="M.Tech">M.Tech</option>
            <option value="MBA">MBA</option>
        </select>
        <br>
        Branch: <select id="branch">
            <option value="CSE">CSE</option>
            <option value="IT">IT</option>
            <option value="EC">EC</option>
            <option value="Automobile">Automobile</option>
            <option value="Mechanical">Mechanical</option>
        </select>
        <br>
        Year: <select id="year">
            <option value="1st">1st</option>
            <option value="2nd">2nd</option>
            <option value="3rd">3rd</option>
            <option value="4th">4th</option>
        </select>
        <br>
        Enrollemnt Number: <input type="number">
        <br>
        <br>
        
        Account credentials:<br>
        Username: <input type="text" placeholder="Username"><br>
        Password: <input type="Password" placeholder="password"><br>
        Confirm password: <input type="password" placeholder="Confirm password">
        Submit: <input type="submit">




    </form>
    
</body>
</html>
